name: Publish Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.3.0"
        required: true
        default: "0.3.0"

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Resolve version
        shell: powershell
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}".TrimStart("v")
            $tag = "v$version"
          } else {
            $tag = "${{ github.ref_name }}"
            $version = $tag.TrimStart("v")
          }
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "TAG_NAME=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        shell: powershell
        run: |
          python -m venv .venv-win
          .\.venv-win\Scripts\python.exe -m pip install --upgrade pip
          .\.venv-win\Scripts\python.exe -m pip install -r requirements.txt
          .\.venv-win\Scripts\python.exe -m pip install pyinstaller==6.11.1

      - name: Validate Python sources
        shell: powershell
        run: |
          .\.venv-win\Scripts\python.exe -m compileall voxgo tests main.py
          .\.venv-win\Scripts\python.exe -m unittest discover -s tests -v

      - name: Build lite and full portable packages
        shell: powershell
        run: |
          .\scripts\build_portable.ps1 -Version "$env:APP_VERSION"

      - name: Write release notes
        shell: powershell
        run: |
          $lite = "release\VoxGo-v$env:APP_VERSION-lite.zip"
          $full = "release\VoxGo-v$env:APP_VERSION-full.zip"
          $liteHash = (Get-FileHash $lite -Algorithm SHA256).Hash.ToLowerInvariant()
          $fullHash = (Get-FileHash $full -Algorithm SHA256).Hash.ToLowerInvariant()
          $liteSize = [math]::Round((Get-Item $lite).Length / 1MB, 1)
          $fullSize = [math]::Round((Get-Item $full).Length / 1MB, 1)
          @"
          ## VoxGo $env:APP_VERSION

          - Improved English realtime recognition latency for game voice.
          - Reduced balanced-mode segmentation delay and queue contention for short voice lines.
          - Added richer latency diagnostics including model, device, candidate labels, and fast-path status.
          - Fixed website and update manifest links to target this release tag.

          ### Downloads

          - ``VoxGo-v$env:APP_VERSION-lite.zip``: $liteSize MB
            - SHA256: ``$liteHash``
          - ``VoxGo-v$env:APP_VERSION-full.zip``: $fullSize MB
            - SHA256: ``$fullHash``
          "@ | Set-Content -Encoding UTF8 release-notes.md

          "LITE_SHA256=$liteHash" | Out-File -FilePath $env:GITHUB_ENV -Append
          "FULL_SHA256=$fullHash" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Update website release manifest
        shell: powershell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main:refs/remotes/origin/main
          git checkout -B main origin/main

          $manifestPath = "docs\update.json"
          $manifest = Get-Content $manifestPath -Raw | ConvertFrom-Json
          $manifest.latest = $env:APP_VERSION
          $manifest.channel = "stable"
          $manifest.title = "VoxGo v$env:APP_VERSION"
          $manifest.notes = @(
            "Improved English realtime recognition latency for game voice.",
            "Reduced balanced-mode segmentation delay and queue contention for short voice lines.",
            "Added richer latency diagnostics including model, device, candidate labels, and fast-path status."
          )
          $manifest.release_url = "https://github.com/${{ github.repository }}/releases/tag/$env:TAG_NAME"
          $manifest.download_lite_url = "https://github.com/${{ github.repository }}/releases/download/$env:TAG_NAME/VoxGo-v$env:APP_VERSION-lite.zip"
          $manifest.download_full_url = "https://github.com/${{ github.repository }}/releases/download/$env:TAG_NAME/VoxGo-v$env:APP_VERSION-full.zip"
          $manifest.sha256_lite = $env:LITE_SHA256
          $manifest.sha256_full = $env:FULL_SHA256
          $manifest.mandatory = $false
          $manifest | ConvertTo-Json -Depth 5 | Set-Content -Encoding UTF8 $manifestPath

          git add $manifestPath
          if (git diff --cached --quiet) {
            Write-Host "Release manifest already up to date."
          } else {
            git commit -m "Update release manifest for $env:TAG_NAME"
            git push origin HEAD:main
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: VoxGo ${{ env.APP_VERSION }}
          body_path: release-notes.md
          files: |
            release/VoxGo-v${{ env.APP_VERSION }}-lite.zip
            release/VoxGo-v${{ env.APP_VERSION }}-full.zip
          fail_on_unmatched_files: true
          make_latest: true
          overwrite_files: true
